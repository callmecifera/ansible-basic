---
- name: Install firewall tools
  apt:
    name: "{{ firewall_packages }}"
    state: "{{ firewall_package_state }}"
    update_cache: "{{ firewall_update_cache }}"

- name: Enable IPv4 forwarding
  sysctl:
    name: "{{ firewall_ip_forward_sysctl }}"
    value: "{{ firewall_ip_forward_value }}"
    sysctl_set: "{{ firewall_sysctl_set }}"
    state: "{{ firewall_sysctl_state }}"
    reload: "{{ firewall_sysctl_reload }}"

- name: Flush filter chains
  iptables:
    chain: "{{ item }}"
    flush: "{{ firewall_flush }}"
  loop: "{{ firewall_filter_chains }}"

- name: Flush NAT chains
  iptables:
    table: "{{ firewall_nat_table }}"
    chain: "{{ item }}"
    flush: "{{ firewall_flush }}"
  loop: "{{ firewall_nat_chains }}"

- name: Allow loopback input
  iptables:
    chain: "{{ firewall_input_chain }}"
    in_interface: "{{ firewall_loopback_interface }}"
    jump: "{{ firewall_accept_jump }}"

- name: Allow established and related input
  iptables:
    chain: "{{ firewall_input_chain }}"
    ctstate: "{{ firewall_established_states }}"
    jump: "{{ firewall_accept_jump }}"

- name: Allow established and related forwarding
  iptables:
    chain: "{{ firewall_forward_chain }}"
    ctstate: "{{ firewall_established_states }}"
    jump: "{{ firewall_accept_jump }}"

- name: Allow ICMP echo request
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ firewall_icmp_protocol }}"
    icmp_type: "{{ firewall_icmp_echo_type }}"
    jump: "{{ firewall_accept_jump }}"

- name: Allow SSH from trusted subnet
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ firewall_tcp_protocol }}"
    source: "{{ firewall_trusted_cidr }}"
    destination_port: "{{ ssh_port }}"
    jump: "{{ firewall_accept_jump }}"

- name: Allow DNS UDP
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ firewall_udp_protocol }}"
    destination_port: "{{ firewall_dns_port }}"
    jump: "{{ firewall_accept_jump }}"

- name: Allow DNS TCP
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ firewall_tcp_protocol }}"
    destination_port: "{{ firewall_dns_port }}"
    jump: "{{ firewall_accept_jump }}"

- name: Allow DHCP server traffic from internal interface
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ firewall_udp_protocol }}"
    in_interface: "{{ iface_internal }}"
    destination_port: "{{ firewall_dhcp_server_port }}"
    jump: "{{ firewall_accept_jump }}"

- name: Allow web service ports
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ firewall_tcp_protocol }}"
    destination_port: "{{ item }}"
    jump: "{{ firewall_accept_jump }}"
  loop: "{{ firewall_web_ports }}"

- name: Allow mail service ports
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ firewall_tcp_protocol }}"
    destination_port: "{{ item }}"
    jump: "{{ firewall_accept_jump }}"
  loop: "{{ firewall_mail_ports }}"

- name: Allow LDAP service ports from trusted subnet
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ firewall_tcp_protocol }}"
    source: "{{ firewall_trusted_cidr }}"
    destination_port: "{{ item }}"
    jump: "{{ firewall_accept_jump }}"
  loop: "{{ firewall_ldap_ports }}"

- name: Allow NFS TCP from allowed network
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ firewall_tcp_protocol }}"
    source: "{{ nfs_allowed_network }}"
    destination_port: "{{ item }}"
    jump: "{{ firewall_accept_jump }}"
  loop: "{{ firewall_nfs_ports }}"

- name: Allow NFS UDP from allowed network
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ firewall_udp_protocol }}"
    source: "{{ nfs_allowed_network }}"
    destination_port: "{{ item }}"
    jump: "{{ firewall_accept_jump }}"
  loop: "{{ firewall_nfs_ports }}"

- name: Allow OpenVPN
  iptables:
    chain: "{{ firewall_input_chain }}"
    protocol: "{{ vpn_proto }}"
    destination_port: "{{ vpn_port }}"
    jump: "{{ firewall_accept_jump }}"

- name: Allow internal network to forward out
  iptables:
    chain: "{{ firewall_forward_chain }}"
    in_interface: "{{ iface_internal }}"
    out_interface: "{{ iface_external }}"
    source: "{{ firewall_trusted_cidr }}"
    jump: "{{ firewall_accept_jump }}"

- name: Masquerade internal network on external interface
  iptables:
    table: "{{ firewall_nat_table }}"
    chain: "{{ firewall_postrouting_chain }}"
    out_interface: "{{ iface_external }}"
    source: "{{ firewall_trusted_cidr }}"
    jump: "{{ firewall_masquerade_jump }}"

- name: Log dropped input packets
  iptables:
    chain: "{{ firewall_input_chain }}"
    limit: "{{ firewall_log_limit }}"
    log_prefix: "{{ firewall_input_log_prefix }}"
    log_level: "{{ firewall_log_level }}"
    jump: "{{ firewall_drop_log_jump }}"

- name: Log dropped forwarded packets
  iptables:
    chain: "{{ firewall_forward_chain }}"
    limit: "{{ firewall_log_limit }}"
    log_prefix: "{{ firewall_forward_log_prefix }}"
    log_level: "{{ firewall_log_level }}"
    jump: "{{ firewall_drop_log_jump }}"

- name: Set filter chain policies
  iptables:
    chain: "{{ item.chain }}"
    policy: "{{ item.policy }}"
  loop: "{{ firewall_chain_policies }}"

- name: Save iptables rules
  command: "{{ firewall_save_command }}"
  changed_when: false
