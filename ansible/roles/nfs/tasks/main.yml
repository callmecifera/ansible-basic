---
- name: Install NFS server packages
  apt:
    name: "{{ nfs_packages }}"
    state: present
    update_cache: yes
  tags: nfs

- name: Ensure NFS export directory exists
  file:
    path: "{{ nfs_export_path }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0775"
  tags: nfs

- name: Ensure NFS exports include directory exists
  file:
    path: "{{ nfs_exports_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: nfs

- name: Configure NFS export
  template:
    src: lks.exports.j2
    dest: "{{ nfs_exports_path }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload NFS Exports
    - Restart NFS Service
  tags: nfs

- name: Apply NFS export configuration before continuing
  meta: flush_handlers
  tags: nfs

- name: Enable and start NFS service
  service:
    name: "{{ nfs_service_name }}"
    enabled: true
    state: started
  tags: nfs

- name: Reload NFS exports (ensure active)
  command: exportfs -ra
  changed_when: false
  tags: nfs

- name: Validate exported NFS filesystems
  command: exportfs -v
  register: nfs_active_exports
  changed_when: false
  failed_when: nfs_export_path not in nfs_active_exports.stdout
  tags: nfs
